services:
  ghost-db:
    image: mysql:8.0
    container_name: hitchhikerdiary-ghost-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ghost_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  ghost:
    image: ghost:5-alpine
    container_name: hitchhikerdiary-ghost
    restart: unless-stopped
    depends_on:
      ghost-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      url: ${GHOST_URL}
      database__client: mysql
      database__connection__host: ghost-db
      database__connection__port: 3306
      database__connection__user: ${MYSQL_USER}
      database__connection__password: ${MYSQL_PASSWORD}
      database__connection__database: ${MYSQL_DATABASE}
    ports:
      - "${GHOST_PORT}:2368"
    volumes:
      - ghost_content:/var/lib/ghost/content
      - ./theme-overrides:/var/lib/ghost/content/themes

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hitchhikerdiary-frontend
    restart: unless-stopped
    environment:
      - GHOST_URL=${GHOST_URL}
      - GHOST_CONTENT_API_KEY=${GHOST_CONTENT_API_KEY}
      - NEXT_PUBLIC_SITE_URL=${FRONTEND_URL}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - ghost

volumes:
  ghost_db_data:
  ghost_content:
